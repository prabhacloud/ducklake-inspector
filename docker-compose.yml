# Convenience runner. Point DUCKLAKE_HOST_DIR at the directory containing
# your lake_meta.db (and its data/ subdir).
#
#   DUCKLAKE_HOST_DIR=/tmp/ducklake-probe docker compose up
#
# Then open http://localhost:3000
#
# NB: the DuckLake metadata db stores data_path as an absolute path. To keep
# that path valid inside the container, we bind-mount the host dir at the
# SAME path inside — no rewriting required.

services:
  ducklake-inspector:
    build: .
    image: ducklake-inspector:latest
    ports:
      - "3000:3000"
    environment:
      DUCKLAKE_METADATA_PATH: ${DUCKLAKE_HOST_DIR:-/tmp/ducklake-probe}/lake_meta.db
      # Uncomment to enable the AI executive summary on /audit:
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # LLM_PROVIDER: anthropic
    volumes:
      # DuckLake needs write access to the sqlite metadata for lock
      # acquisition, even on read-only queries. Mount at the same path
      # so absolute paths inside the metadata resolve identically.
      - ${DUCKLAKE_HOST_DIR:-/tmp/ducklake-probe}:${DUCKLAKE_HOST_DIR:-/tmp/ducklake-probe}
